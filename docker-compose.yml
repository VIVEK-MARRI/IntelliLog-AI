# Full stack: PostgreSQL + Redis + backend + frontend (nginx) + agent-worker
# Run: docker compose up -d
#
# Port reference (canonical — all config files must match this):
#   Backend API:  8000
#   Frontend:     3000
#   PostgreSQL:   5432
#   Redis:        6379

services:

  postgres:
    image: postgres:16-alpine
    container_name: intelliglog-postgres
    environment:
      POSTGRES_DB: intelliglog
      POSTGRES_USER: intelliglog
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelliglog"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: intelliglog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliglog-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://intelliglog:dev-password@postgres:5432/intelliglog
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-key-change-in-production
      ENVIRONMENT: development
      SKIP_EXTERNAL_STARTUP_CHECKS: "true"
      GEMINI_API_KEY: ""
      PROMETHEUS_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python scripts/docker_seed.py && uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # LangGraph agent worker — consumes GPS pings from the Redis Stream
  # and runs the risk-decision graph (alert / reroute / no-action).
  # Previously wired only in docker-compose.dev.yml and docker-compose.prod.yml;
  # added here so a plain `docker compose up` produces a fully working system.
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliglog-agent-worker
    command: python -m src.core.agent_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://intelliglog:dev-password@postgres:5432/intelliglog
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-key-change-in-production
      ENVIRONMENT: development
      SKIP_EXTERNAL_STARTUP_CHECKS: "true"
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelliglog-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
