# Grafana Provisioning: Prometheus Datasource
# This file auto-configures Prometheus as a datasource in Grafana

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      maxDataPoints: 2880
    version: 1
